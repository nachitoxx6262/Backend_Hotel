<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Factura de estadía</title></head>
<body style="font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:0;">
  <table width="100%" cellpadding="0" cellspacing="0">
    <tr><td align="center" style="padding:40px 0;">
      <table width="580" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
        <tr><td style="background:#1a56db; border-radius:8px 8px 0 0; padding:30px; text-align:center;">
          <h1 style="color:#ffffff; margin:0; font-size:22px;">{{ hotel_nombre }}</h1>
          <p style="color:#bfdbfe; margin:8px 0 0;">Factura de estadía adjunta</p>
        </td></tr>
        <tr><td style="padding:40px 50px;">
          <p style="color:#6b7280; font-size:15px; line-height:1.6;">
            Hola <strong>{{ huesped_nombre }}</strong>, gracias por hospedarte en <strong>{{ hotel_nombre }}</strong>.
            Adjuntamos la factura de tu estadía.
          </p>
          <table width="100%" style="background:#f9fafb; border-radius:6px; padding:20px; margin:20px 0;">
            <tr><td style="padding:6px 0; color:#374151; font-size:14px;"><strong>Factura Nº:</strong></td><td style="color:#1a56db; font-weight:bold;">{{ invoice_number }}</td></tr>
            <tr><td style="padding:6px 0; color:#374151; font-size:14px;"><strong>Total:</strong></td><td style="color:#111827; font-weight:bold;">{{ total }}</td></tr>
            <tr><td style="padding:6px 0; color:#374151; font-size:14px;"><strong>Saldo:</strong></td><td style="color:{{ '#059669' if saldo_ok else '#dc2626' }}; font-weight:bold;">{{ saldo }}</td></tr>
          </table>
          <p style="color:#9ca3af; font-size:13px;">¡Esperamos verte pronto!</p>
          <hr style="border:none; border-top:1px solid #e5e7eb; margin:30px 0;">
          <p style="color:#9ca3af; font-size:12px; text-align:center;">© {{ year }} {{ hotel_nombre }}</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
